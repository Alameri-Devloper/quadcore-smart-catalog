services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qsc}
      POSTGRES_USER: ${POSTGRES_USER:-qsc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qsc_dev_password}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - qsc_postgres_data:/var/lib/postgresql/data

volumes:
  qsc_postgres_data:
